<template>
    <lightning-card>
        <div class="card-body">

            <!-- Header Section -->
            <div class="header-section">
                <div class="header-content">
                    <div class="header-text">
                        <h2 class="card-title">Object Mapping</h2>
                        <p class="card-subtitle">Configure Salesforce to Shelfwatch object relationships</p>
                    </div>
                    <div class="toggle-wrapper">
                        <lightning-input type="checkbox" label="New Entity" variant="label-hidden" checked={newEntity}
                            onchange={handleToggle} class="toggle-input-lwc"></lightning-input>
                        <span class="toggle-text">New Entity</span>
                    </div>
                </div>
                <div class="header-divider"></div>
            </div>

            <!-- Existing Entity Mode -->
            <template if:false={newEntity}>
                <div class="fields-section">
                    <div class="section-badge">Existing Entity</div>
                    <div class="fields-grid">

                        <div class="field-card">
                            <div class="field-icon">
                                <lightning-icon icon-name="standard:data_streams" size="small"
                                    alternative-text="Salesforce Object"></lightning-icon>
                            </div>
                            <div class="field-content">
                                <div class="field-label">Salesforce Object</div>
                                <div class="search-box" onclick={preventClose}>
                                    <lightning-input label="" type="text" value={searchTerm} onchange={handleSearch}
                                        onfocus={showDropdown} placeholder="Search and select an object...">
                                    </lightning-input>
                                    <template if:true={showList}>
                                        <div class="dropdown">
                                            <template for:each={filteredOptions} for:item="opt">
                                                <div key={opt.value} class="dropdown-item" data-value={opt.value}
                                                    onclick={selectOption}>
                                                    {opt.label}
                                                </div>
                                            </template>
                                            <template if:false={filteredOptions.length}>
                                                <div class="no-result">
                                                    <lightning-icon icon-name="utility:search" size="x-small"
                                                        alternative-text="Search"></lightning-icon>
                                                    <span>No matching objects found</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="field-connector">
                            <div class="connector-line"></div>
                            <lightning-icon icon-name="utility:switch" size="x-small" alternative-text="maps to">
                            </lightning-icon>
                            <div class="connector-line"></div>
                        </div>

                        <div class="field-card">
                            <div class="field-icon">
                                <lightning-icon icon-name="standard:dataset" size="small"
                                    alternative-text="Shelfwatch Object"></lightning-icon>
                            </div>
                            <div class="field-content">
                                <div class="field-label">Shelfwatch Object</div>
                                <lightning-combobox label="" value={selectedObj1} options={shelfobjectOptions}
                                    onchange={handleObj1} placeholder="Select an object..."></lightning-combobox>
                            </div>
                        </div>

                    </div>
                </div>
            </template>

            <!-- New Entity Mode -->
            <template if:true={newEntity}>
                <div class="fields-section">
                    <div class="section-badge new-entity-badge">New Entity</div>
                    <div class="fields-grid single-col">

                        <div class="field-card">
                            <div class="field-icon">
                                <lightning-icon icon-name="standard:data_streams" size="small"
                                    alternative-text="Salesforce Object"></lightning-icon>
                            </div>
                            <div class="field-content">
                                <div class="field-label">Salesforce Object</div>
                                <div class="search-box" onclick={preventClose}>
                                    <lightning-input label="" type="text" value={searchTerm} onchange={handleSearch}
                                        onfocus={showDropdown} placeholder="Search and select an object...">
                                    </lightning-input>
                                    <template if:true={showList}>
                                        <div class="dropdown">
                                            <template for:each={filteredOptions} for:item="opt">
                                                <div key={opt.value} class="dropdown-item" data-value={opt.value}
                                                    onclick={selectOption}>
                                                    {opt.label}
                                                </div>
                                            </template>
                                            <template if:false={filteredOptions.length}>
                                                <div class="no-result">
                                                    <lightning-icon icon-name="utility:search" size="x-small"
                                                        alternative-text="Search"></lightning-icon>
                                                    <span>No matching objects found</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </template>

            <!-- Footer -->
            <div class="footer-section">
                <lightning-button variant="brand" label="Next" onclick={handleNext}></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
